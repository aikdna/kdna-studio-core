name: CI
on: [pull_request, push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check out the exact Core candidate outside the Studio workspace
        env:
          KDNA_CORE_CANDIDATE_REPOSITORY: aikdna/kdna
          KDNA_CORE_CANDIDATE_COMMIT: a257b92345af57e6fb20215576bc976a5291b297
        run: |
          set -euo pipefail
          runner_temp="$(realpath "$RUNNER_TEMP")"
          workspace="$(realpath "$GITHUB_WORKSPACE")"
          candidate_source="$runner_temp/kdna-core-candidate"
          test ! -e "$candidate_source"
          git init --quiet "$candidate_source"
          git -C "$candidate_source" remote add origin \
            "https://github.com/$KDNA_CORE_CANDIDATE_REPOSITORY.git"
          git -C "$candidate_source" fetch --quiet --no-tags --depth=1 origin \
            "$KDNA_CORE_CANDIDATE_COMMIT"
          git -C "$candidate_source" checkout --quiet --detach \
            "$KDNA_CORE_CANDIDATE_COMMIT"
          test "$(git -C "$candidate_source" rev-parse HEAD)" = \
            "$KDNA_CORE_CANDIDATE_COMMIT"
          candidate_source="$(realpath "$candidate_source")"
          case "$candidate_source" in
            "$runner_temp"/*) ;;
            *) exit 1 ;;
          esac
          case "$candidate_source" in
            "$workspace"/*) exit 1 ;;
          esac
          echo "KDNA_CORE_CANDIDATE_SOURCE=$candidate_source" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - name: Acquire and verify the audited npm release bytes
        run: |
          node scripts/acquire-trusted-npm-release.js --out "$RUNNER_TEMP/npm-11.17.0.tgz"
          echo "KDNA_TRUSTED_NPM_TARBALL=$RUNNER_TEMP/npm-11.17.0.tgz" >> "$GITHUB_ENV"
      - run: node scripts/run-trusted-npm.js ci --ignore-scripts --registry=https://registry.npmjs.org/ --@aikdna:registry=https://registry.npmjs.org/
      - run: node scripts/run-trusted-npm.js run verify:candidate-sources
      - run: node scripts/run-trusted-npm.js test
