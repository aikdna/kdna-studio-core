name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.action == 'published' &&
      github.event.release.draft == false &&
      github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_EVENT_ACTION: ${{ github.event.action }}
      RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      RELEASE_IS_DRAFT: ${{ github.event.release.draft }}
      RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.23.1
          check-latest: false
          registry-url: 'https://registry.npmjs.org'
      - run: node --version | grep -Fx "$(printf 'v%s' '22.23.1')"
      - name: Acquire and verify the audited npm release bytes
        run: |
          node scripts/acquire-trusted-npm-release.js --out "$RUNNER_TEMP/npm-11.17.0.tgz"
          echo "KDNA_TRUSTED_NPM_TARBALL=$RUNNER_TEMP/npm-11.17.0.tgz" >> "$GITHUB_ENV"
      - run: node scripts/run-trusted-npm.js ci --ignore-scripts --registry=https://registry.npmjs.org/ --@aikdna:registry=https://registry.npmjs.org/
      - name: Verify release event, tag, commit, package, and changelog
        run: node scripts/run-trusted-npm.js run release:check
      - name: Run the complete release test suite
        run: node scripts/run-trusted-npm.js run test:all
      - name: Build independently verified pack evidence
        run: >-
          node scripts/run-trusted-npm.js run release:generate-evidence --
          --out "$RUNNER_TEMP/kdna-studio-core-release-evidence.json"
          --artifact "$RUNNER_TEMP/kdna-studio-core-release.tgz"
      - name: Publish or idempotently skip the verified package
        run: >-
          node scripts/publish-verified-artifact.js
          --evidence "$RUNNER_TEMP/kdna-studio-core-release-evidence.json"
          --artifact "$RUNNER_TEMP/kdna-studio-core-release.tgz"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Remove transient release artifacts
        if: always()
        run: >-
          rm -f
          "$RUNNER_TEMP/kdna-studio-core-release-evidence.json"
          "$RUNNER_TEMP/kdna-studio-core-release.tgz"
